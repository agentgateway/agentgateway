          path: /v1/traces
          protocol: GRPC
          providerBackend:
            inline:
              hostname: otel.example.com
              port: 4317
      key: frontend/default/tracing-url:frontend-tracing:default/test
      name:
        kind: AgentgatewayPolicy
        name: tracing-url
        namespace: default
      target:
        gateway:
          name: test
