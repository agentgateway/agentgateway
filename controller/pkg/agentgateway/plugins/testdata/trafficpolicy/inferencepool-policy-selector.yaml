apiVersion: inference.networking.k8s.io/v1
kind: InferencePool
metadata:
  name: gateway-pool
  namespace: default
  labels:
    app: gateway-pool
spec:
  appProtocol: kubernetes.io/h2c
  endpointPickerRef:
    failureMode: FailClose
    group: ""
    kind: Service
    name: gateway-pool-endpoint-picker
    port:
      number: 9002
  selector:
    matchLabels:
      app: gateway
  targetPorts:
    - number: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-pool-endpoint-picker
  namespace: default
spec:
  ports:
    - port: 9002
      protocol: TCP
  selector:
    app: gateway
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: pool-rl-policy
  namespace: default
spec:
  targetSelectors:
  - group: inference.networking.k8s.io
    kind: InferencePool
    matchLabels:
      app: gateway-pool
  traffic:
    rateLimit:
      local:
        - requests: 100
          unit: Minutes
          burst: 10

---
