apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: extmcp
  namespace: default
spec:
  targetRefs:
    - kind: Gateway
      name: test
      group: gateway.networking.k8s.io
  backend:
    mcp:
      extMcp:
        processors:
        - remote:
            backendRef:
              name: extmcp-srv
              port: 4317
            failureMode: FailClosed
            metadata:
              tenant: 'jwt.sub'
        methods:
          tools/call: Both
          tools/list: Request
---
apiVersion: v1
kind: Service
metadata:
  name: extmcp-srv
  namespace: default
spec:
  ports:
    - port: 4317

---
# Output
output:
- gateway:
    Name: test
    Namespace: default
  resource:
    policy:
      backend:
        extMcp:
          methods:
            tools/call: BOTH
            tools/list: REQUEST
          processors:
          - remote:
              metadata:
                tenant: jwt.sub
              target:
                port: 4317
                service:
                  hostname: extmcp-srv.default.svc.cluster.local
                  namespace: default
      key: backend/default/extmcp:mcp-extmcp:default/test
      name:
        kind: AgentgatewayPolicy
        name: extmcp
        namespace: default
      target:
        gateway:
          name: test
          namespace: default
status:
