apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: agw
  namespace: default
spec:
  targetRefs:
    - kind: HTTPRoute
      name: test
      group: gateway.networking.k8s.io
  backend:
    transformation:
      request:
        set:
          - name: x-backend-req
            value: request.headers['x-request-id']
      response:
        add:
          - name: x-backend-resp
            value: string(response.code)
---
# Output
output:
- gateway:
    Name: test
    Namespace: default
  resource:
    bind:
      key: 8080/default/test
      port: 8080
- gateway:
    Name: test
    Namespace: default
  resource:
    listener:
      bindKey: 8080/default/test
      key: default/test.http
      name:
        gatewayName: test
        gatewayNamespace: default
        listenerName: http
      protocol: HTTP
- gateway:
    Name: test
    Namespace: default
  resource:
    route:
      backends:
      - backend:
          port: 8080
          service:
            hostname: reviews.default.svc.cluster.local
            namespace: default
        weight: 1
      - {}
      hostnames:
      - www.example.com
      key: default/test.0.http
      listenerKey: default/test.http
      name:
        kind: HTTPRoute
        name: test
        namespace: default
- resource:
    policy:
      backend:
        transformation:
          request:
            set:
            - expression: request.headers['x-request-id']
              name: x-backend-req
          response:
            add:
            - expression: string(response.code)
              name: x-backend-resp
      key: default/agw:backend-transformation:default/test
      name:
        kind: AgentgatewayPolicy
        name: agw
        namespace: default
      target:
        route:
          kind: HTTPRoute
          name: test
          namespace: default
status:
  ancestors:
  - ancestorRef:
      group: gateway.networking.k8s.io
      kind: Gateway
      name: test
      namespace: default
    conditions:
    - lastTransitionTime: fake
      message: Policy accepted
      reason: Valid
      status: "True"
      type: Accepted
    - lastTransitionTime: fake
      message: Attached to all targets
      reason: Attached
      status: "True"
      type: Attached
    controllerName: agentgateway.dev/agentgateway
