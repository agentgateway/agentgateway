syntax = "proto3";

package agentgateway.dev.ext_mcp;

import "google/protobuf/struct.proto";

option go_package = "github.com/agentgateway/agentgateway/go/api;api";

// ExtMcp is the wire protocol for an MCP-aware external policy server.
// Modeled on Envoy ext_authz, but at the MCP method layer.
// Covers both gating and mutation.
service ExtMcp {
  rpc CheckRequest(McpRequest) returns (McpRequestResult);
  rpc CheckResponse(McpResponse) returns (McpResponseResult);
}

message McpRequest {
  // Backend name in its native (unmuxed) namespace.
  string service_name = 1;
  // JSON-RPC method (e.g. "tools/call", "tools/list").
  string method = 2;
  // CEL-evaluated context from gateway config, one field per config key.
  google.protobuf.Struct metadata_context = 3;
  // JSON-RPC `params` for this method.
  google.protobuf.Struct mcp_request = 4;
  // Incoming HTTP request headers carrying this MCP call, after gateway-side
  // allow/deny filtering. Multi-value headers appear as repeated entries with
  // the same key. Non-UTF8 header values are dropped. Empty for stdio upstreams.
  repeated Header headers = 5;
}

message McpResponse {
  string service_name = 1;
  string method = 2;
  google.protobuf.Struct metadata_context = 3;
  // JSON-RPC `result` from upstream. Error responses don't reach this hook.
  google.protobuf.Struct mcp_response = 4;
}

message McpRequestResult {
  oneof result {
    Pass pass = 1;
    // Replaces JSON-RPC `params` before forwarding to the upstream MCP server.
    // The gateway does not re-run other RBAC on the mutated request.
    google.protobuf.Struct mutated = 2;
    AuthorizationError error = 3;
  }
  // Mutations applied to the upstream HTTP request that carries this MCP call.
  // Honored on Pass and Mutated, ignored on Error and for stdio upstreams.
  HeaderMutation header_mutation = 4;
  // Arbitrary key/value bag stashed in request extensions and exposed to CEL as
  // `extmcp.<key>`. Subsequent backend filters (e.g. `transformation`) can read
  // from it. Honored on Pass and Mutated; merged with later drivers' metadata.
  google.protobuf.Struct metadata = 5;
}

message McpResponseResult {
  oneof result {
    Pass pass = 1;
    google.protobuf.Struct mutated = 2;
    AuthorizationError error = 3;
  }
}

message HeaderMutation {
  // Headers to overwrite (insert if absent). If the same key is listed multiple
  // times it is treated as a list (all values replace the existing header).
  repeated Header set = 1;
  // Header names to remove (case-insensitive).
  repeated string remove = 2;
}

message Header {
  string key = 1;
  string value = 2;
}

message Pass {}

message AuthorizationError {
  enum Code {
    UNKNOWN = 0;
    PERMISSION_DENIED = 1;
    RESOURCE_EXHAUSTED = 2;
    INVALID = 3;
  }
  Code code = 1;
  string reason = 2;
  // Optional explicit JSON-RPC error payload. Overrides the code-derived default.
  google.protobuf.Struct mcp_error = 3;
}
