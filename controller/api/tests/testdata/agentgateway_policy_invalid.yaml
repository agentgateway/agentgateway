apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: backend-guardrails-on-service
spec:
  targetRefs:
    - group: ""
      kind: Service
      name: f1
  backend:
    mcp:
      guardrails:
        processors:
        - remote:
            backendRef:
              name: guardrails-srv
              port: 4317
          methods:
            tools/call: Full
---
_err: 'exactly one of the fields in [backendRef url] must be set'
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: backend-guardrails-no-backend-ref
spec:
  targetRefs:
    - kind: Gateway
      name: test
      group: gateway.networking.k8s.io
  backend:
    mcp:
      guardrails:
        processors:
        - remote:
            failureMode: FailClosed
          methods:
            tools/call: Full
---
_err: 'traffic.jwtAuthentication may not be used with backend.mcp.authentication in the same policy'
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: jwt-and-mcp-authentication
spec:
  traffic:
    jwtAuthentication:
      providers:
        - issuer: https://example.com
          jwks:
            inline: '{"keys":[]}'
  backend:
    mcp:
      authentication:
        issuer: https://example.com
        jwks:
          backendRef:
            kind: Service
            name: jwks
          jwksPath: /.well-known/jwks.json
---
_err: "targetRefs may only"
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: bad-group
spec:
  targetRefs:
    - group: ""
      kind: Backend
      name: dummy
---
_err: "the 'traffic.phase=PreRouting' field can only target a Gateway or ListenerSet"
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: traffic-invalid-phase-policy
spec:
  targetRefs:
    - group: "gateway.networking.k8s.io"
      kind: HTTPRoute
      name: dummy
  traffic:
    phase: PreRouting
    transformation:
      request:
        set:
          - name: X-Gateway
            value: '"true"'
---
_err: "phase PreRouting only supports extAuth, authorization, transformation, "
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: traffic-invalid-phase-policy-rule
spec:
  targetRefs:
    - group: "gateway.networking.k8s.io"
      kind: Gateway
      name: dummy
  traffic:
    phase: PreRouting
    rateLimit:
      local:
        - requests: 100
          unit: Minutes
