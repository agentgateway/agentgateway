name: Branch

on:
  push:
    branches:
      - "main"
      - "howardjohn/pre-regression"
  pull_request:
    branches:
      - "main"
      - "howardjohn/pre-regression"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CI: true
  RUST_VERSION: "1.93.1"
  GO_VERSION: "1.26.1"

jobs:
  #### Controller jobs ####
  controller-e2e:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v6
    - name: Install Rust
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: "${{ env.RUST_VERSION }}"
    - uses: Swatinem/rust-cache@v2
      with:
        # Github cache will restore from 'main' OR the current branch.
        # If we cache PR branches, we may evict the 'main' cache and end up with no cache hits at all.
        # Ideally, we would have main be 'high priority' and not be evicted but I don't think thats possible.
        save-if: ${{ github.ref == 'refs/heads/main' }}
    - uses: actions/setup-go@v6
      with:
        go-version: "${{ env.GO_VERSION }}"
        cache-dependency-path: |
          **/*.sum
          .github/workflows/cache-e2e
    - name: Set Path
      run: |
        echo "./tools" >> $GITHUB_PATH
    - name: Fake cache
      run: |
        cargo build --profile ci
        cargo clean -p agentgateway || true
        cargo clean -p agentgateway-app || true
        cargo clean -p cel || true
        cargo clean -p agent-celx || true
        cargo clean -p agent-core || true
        cargo clean -p agent-hbone || true
        cargo clean -p htpasswd-verify-fork || true
        cargo clean -p hyper-util-fork || true
        cargo clean -p agent-xds || true
    - name: Setup
      run: TEST_MODE=e2e ./controller/test/setup/setup-kind-ci.sh
    - name: E2E
      run: |
        CGO_ENABLED=0 PERSIST_INSTALL=true go test -tags=e2e -v ./controller/test/e2e/tests -run '^TestAgentgatewayIntegration'
    - name: Archive bug report directory on failure
      if: ${{ failure() }}
      uses: actions/upload-artifact@v6
      with:
        name: bug-report
        path: ./controller/_test/bug_report/kind
        retention-days: 2
    - name: Upload cargo timings
      uses: actions/upload-artifact@v6
      with:
        name: cargo-timings-e2e
        path: target/cargo-timings/cargo-timing*.html
        retention-days: 2
    - name: Summary
      run: |
        echo '# E2E Timings\n'
        cat controller/_test/ci-step-timings.log >> $GITHUB_STEP_SUMMARY
