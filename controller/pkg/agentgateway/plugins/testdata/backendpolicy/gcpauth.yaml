apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: id
  namespace: default
spec:
  targetRefs:
    - kind: HTTPRoute
      name: test
      group: gateway.networking.k8s.io
  backend:
    auth:
      gcp:
        type: IdToken
        audience: hello.world.example.com
---
# Output
output:
- gateway:
    Name: test
    Namespace: default
  resource:
    bind:
      key: 8080/default/test
      port: 8080
- gateway:
    Name: test
    Namespace: default
  resource:
    listener:
      bindKey: 8080/default/test
      key: default/test.http
      name:
        gatewayName: test
        gatewayNamespace: default
        listenerName: http
      protocol: HTTP
- gateway:
    Name: test
    Namespace: default
  resource:
    route:
      backends:
      - backend:
          port: 8080
          service:
            hostname: reviews.default.svc.cluster.local
            namespace: default
        weight: 1
      - {}
      hostnames:
      - www.example.com
      key: default/test.0.http
      listenerKey: default/test.http
      name:
        kind: HTTPRoute
        name: test
        namespace: default
- resource:
    policy:
      backend:
        auth:
          gcp:
            idToken:
              audience: hello.world.example.com
      key: backend/default/id:backend-auth:default/test
      name:
        kind: AgentgatewayPolicy
        name: id
        namespace: default
      target:
        route:
          kind: HTTPRoute
          name: test
          namespace: default
status:
  ancestors:
  - ancestorRef:
      group: gateway.networking.k8s.io
      kind: Gateway
      name: test
      namespace: default
    conditions:
    - lastTransitionTime: fake
      message: Policy accepted
      reason: Valid
      status: "True"
      type: Accepted
    - lastTransitionTime: fake
      message: Attached to all targets
      reason: Attached
      status: "True"
      type: Attached
    controllerName: agentgateway.dev/agentgateway
