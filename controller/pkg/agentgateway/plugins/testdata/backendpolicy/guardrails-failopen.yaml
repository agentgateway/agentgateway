apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: guardrails-failopen
  namespace: default
spec:
  targetRefs:
    - kind: Gateway
      name: test
      group: gateway.networking.k8s.io
  backend:
    mcp:
      guardrails:
        processors:
        - remote:
            url: https://guardrails.example.com:4317
            failureMode: FailOpen
          methods:
            tools/call: "Off"
            tools/list: Response
            prompts/list: Request
---
# Output
output:
- gateway:
    Name: test
    Namespace: default
  resource:
    policy:
      backend:
        mcpGuardrails:
          processors:
          - methods:
              prompts/list: REQUEST
              tools/call: "OFF"
              tools/list: RESPONSE
            remote:
              failureMode: ALLOW
              inlinePolicies:
              - backendTls:
                  hostname: guardrails.example.com
              target:
                inline:
                  hostname: guardrails.example.com
                  port: 4317
      key: backend/default/guardrails-failopen:mcp-guardrails:default/test
      name:
        kind: AgentgatewayPolicy
        name: guardrails-failopen
        namespace: default
      target:
        gateway:
          name: test
          namespace: default
status:
- apiVersion: agentgateway.dev/v1alpha1
  kind: AgentgatewayPolicy
  metadata:
    name: guardrails-failopen
    namespace: default
  spec: null
  status:
    ancestors:
    - ancestorRef:
        group: gateway.networking.k8s.io
        kind: Gateway
        name: test
        namespace: default
      conditions:
      - lastTransitionTime: fake
        message: Policy accepted
        reason: Valid
        status: "True"
        type: Accepted
      - lastTransitionTime: fake
        message: Attached to all targets
        reason: Attached
        status: "True"
        type: Attached
      controllerName: agentgateway.dev/agentgateway
