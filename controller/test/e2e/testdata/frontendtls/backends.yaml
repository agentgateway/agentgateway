apiVersion: v1
kind: Namespace
metadata:
  name: agentgateway-frontendtls
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: agentgateway-frontendtls
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: backend
    spec:
      containers:
        - image: ghcr.io/agentgateway/testbox:0.0.1
          imagePullPolicy: IfNotPresent
          name: testbox
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            periodSeconds: 2
            failureThreshold: 10
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: agentgateway-frontendtls
spec:
  selector:
    app.kubernetes.io/name: backend
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
