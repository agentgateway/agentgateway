binds:
  - port: 3000
    listeners:
      - routes:
          - backends:
              - mcp:
                  targets:
                    - name: everything
                      stdio:
                        cmd: npx
                        args:
                          - "@modelcontextprotocol/server-everything"
                  statefulMode: stateless
            policies:
              cors:
                allowOrigins:
                  - "*"
                allowHeaders:
                  - mcp-protocol-version
                  - content-type
                  - cache-control
                allowMethods:
                  - GET
                  - POST
                  - OPTIONS
                exposeHeaders:
                  - Mcp-Session-Id
