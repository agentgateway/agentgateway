apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: selector-gw
  namespace: default
spec:
  gatewayClassName: agentgateway
  allowedListeners:
    namespaces:
      from: All
  listeners:
  - name: http
    protocol: HTTP
    port: 8080
---
apiVersion: gateway.networking.k8s.io/v1
kind: ListenerSet
metadata:
  name: labeled-ls
  namespace: default
  labels:
    env: staging
spec:
  parentRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: selector-gw
  listeners:
  - name: extra
    protocol: HTTP
    port: 9090
    allowedRoutes:
      namespaces:
        from: All
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: ls-selector-policy
  namespace: default
spec:
  targetSelectors:
  - kind: ListenerSet
    group: gateway.networking.k8s.io
    matchLabels:
      env: staging
  traffic:
    timeouts:
      request: 30s
