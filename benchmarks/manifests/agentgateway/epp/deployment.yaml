apiVersion: apps/v1
kind: Deployment
metadata:
  name: epp
  namespace: inference-benchmark
  labels:
    app: epp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: epp
  template:
    metadata:
      labels:
        app: epp
    spec:
      serviceAccountName: epp
      containers:
        - name: epp
          image: registry.k8s.io/gateway-api-inference-extension/epp:v1.4.0
          imagePullPolicy: IfNotPresent
          args:
            - --pool-name
            - inference-pool
            - --pool-namespace
            - inference-benchmark
            - --grpc-port
            - "9002"
            - --grpc-health-port
            - "9003"
            - --metrics-port
            - "9090"
          ports:
            - name: grpc
              containerPort: 9002
              protocol: TCP
            - name: grpc-health
              containerPort: 9003
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          livenessProbe:
            grpc:
              port: 9003
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            grpc:
              port: 9003
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
