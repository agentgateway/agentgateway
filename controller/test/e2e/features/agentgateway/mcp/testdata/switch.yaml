apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-switch-upstream
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mcp-switch-upstream
  template:
    metadata:
      labels:
        app: mcp-switch-upstream
        app.kubernetes.io/name: mcp-switch-upstream
    spec:
      containers:
      - image: ghcr.io/agentgateway/testbox:0.0.1
        imagePullPolicy: IfNotPresent
        name: testbox
        env:
        - name: INSTANCE_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
---
apiVersion: v1
kind: Service
metadata:
  name: mcp-switch-upstream
  namespace: default
  labels:
    app: mcp-switch-upstream
spec:
  selector:
    app.kubernetes.io/name: mcp-switch-upstream
  ports:
  - name: mcp
    port: 80
    targetPort: 8000
    appProtocol: kgateway.dev/mcp
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: mcp-backend
  namespace: default
spec:
  mcp:
    targets:
    - name: switch-target
      selector:
        services:
          matchLabels:
            app: mcp-switch-upstream
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: mcp-route
  namespace: default
spec:
  parentRefs:
  - name: gateway
    namespace: agentgateway-base
  rules:
  - backendRefs:
    - name: mcp-backend
      kind: AgentgatewayBackend
      group: agentgateway.dev
