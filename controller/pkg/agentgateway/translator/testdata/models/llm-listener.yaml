      bindKey: 80/default/llm-only
      key: default/llm-only.llm
      name:
        gatewayName: llm-only
        gatewayNamespace: default
        listenerName: llm
      protocol: HTTP
- gateway:
    Name: llm-only
    Namespace: default
  resource:
    modelRoute:
      concreteModel:
        backend:
          backend: default/gpt-5-mini/backend.llm
      key: default/gpt-5-mini.llm
      listenerKey: default/llm-only.llm
      match:
        model: gpt-5-mini
