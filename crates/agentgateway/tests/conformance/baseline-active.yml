# MCP conformance baseline for the "active" suite, dated releases up to 2025-11-25.
#
# The "active" suite is the legacy regression guard: the downstream protocol the
# gateway supports today. Generated by running the MCP Conformance Test Framework
# in server mode against the everything-server (the reference 2026-07-28 server,
# which also negotiates legacy versions) fronted by agentgateway. See README.md to
# regenerate.
#
# This is server-mode, so failures live under the `server:` key. A scenario counts
# as failing if ANY of its checks is FAILURE *or* WARNING, so every entry below
# must keep failing for the run to stay green. A newly passing entry is "stale"
# and fails the run until removed.
#
# Every entry is a gateway-side gap; the reference upstream behaves correctly.
server:
  # Gateway does not enforce DNS-rebinding protection: it forwards a request whose
  # Host/Origin is not localhost (got HTTP 200) instead of rejecting it with 4xx.
  # MCP transport security best practice (security_best_practices#local-mcp-server-compromise).
  - dns-rebinding-protection
