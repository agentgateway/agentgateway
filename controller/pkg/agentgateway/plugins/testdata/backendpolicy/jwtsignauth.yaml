apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: jwt-sign
  namespace: default
spec:
  targetRefs:
    - kind: HTTPRoute
      name: test
      group: gateway.networking.k8s.io
  backend:
    auth:
      jwtSign:
        signingKeyRef:
          name: jwt-sign-secret
        alg: RS256
        kid: key-1
        claims:
          iss: acct.user
          sub: acct.user
        ttl: 300s
---
apiVersion: v1
kind: Secret
metadata:
  name: jwt-sign-secret
  namespace: default
type: Opaque
data:
  signingKey: cGVtLXZhbHVl
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: jwt-sign-secret-not-found
  namespace: default
spec:
  targetRefs:
    - kind: HTTPRoute
      name: test
      group: gateway.networking.k8s.io
  backend:
    auth:
      jwtSign:
        signingKeyRef:
          name: jwt-sign-secret-missing
        claims:
          iss: acct.user
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: jwt-sign-sub-second-ttl
  namespace: default
spec:
  targetRefs:
    - kind: HTTPRoute
      name: test
      group: gateway.networking.k8s.io
  backend:
    auth:
      jwtSign:
        signingKeyRef:
          name: jwt-sign-secret
        claims:
          iss: acct.user
        ttl: 1500ms
---
