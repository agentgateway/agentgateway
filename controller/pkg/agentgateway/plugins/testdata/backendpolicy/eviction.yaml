      key: 8080/default/test
      port: 8080
- gateway:
    Name: test
    Namespace: default
  resource:
    listener:
      bindKey: 8080/default/test
      key: default/test.http
      name:
        gatewayName: test
        gatewayNamespace: default
        listenerName: http
      protocol: HTTP
- gateway:
