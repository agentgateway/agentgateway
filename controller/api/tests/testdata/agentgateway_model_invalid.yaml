_err: upstreamOverrides.baseURL must use http or https
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayModel
metadata:
  name: incomplete-upstream-endpoint
spec:
  parentRefs:
  - name: ai-gateway
    sectionName: llm
  provider: OpenAI
  upstreamOverrides:
    baseURL: ftp://api.openai.com
---
_err: upstreamOverrides requires provider
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayModel
metadata:
  name: virtual-model-with-upstream-overrides
spec:
  parentRefs:
  - name: ai-gateway
    sectionName: llm
  upstreamOverrides:
    model: should-not-be-accepted
  virtualModel:
    weighted:
      targets:
      - modelRef:
          name: concrete-model
---
_err: ollama requires upstreamOverrides.baseURL
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayModel
metadata:
  name: ollama-without-base-url
spec:
  parentRefs:
  - name: ai-gateway
    sectionName: llm
  provider: Ollama
---
_err: upstreamOverrides.baseURL cannot target localhost, loopback, or link-local addresses
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayModel
metadata:
  name: local-base-url
spec:
  parentRefs:
  - name: ai-gateway
    sectionName: llm
  provider: OpenAI
  upstreamOverrides:
    baseURL: http://169.254.169.254/latest/meta-data
---
_err: upstreamPolicies cannot be used with virtualModel
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayModel
metadata:
  name: virtual-model-with-policies
spec:
  parentRefs:
  - name: ai-gateway
    sectionName: llm
  upstreamPolicies:
    health:
      unhealthyCondition: response.code >= 500
  virtualModel:
    weighted:
      targets:
      - modelRef:
          name: concrete-model
---
_err: azure must be set if and only if provider is Azure
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayModel
metadata:
  name: azure-settings-for-openai
spec:
  parentRefs:
  - name: ai-gateway
    sectionName: llm
  provider: OpenAI
  azure:
    resourceName: example
    resourceType: OpenAI
