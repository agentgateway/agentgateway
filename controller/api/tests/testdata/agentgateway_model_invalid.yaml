_err: virtual model match.model must be an exact name
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayModel
metadata:
  name: wildcard-virtual-model
spec:
  parentRefs:
  - name: ai-gateway
    sectionName: llm
  match:
    model: virtual/*
  virtualModel:
    weighted:
      targets:
      - modelRef:
          name: concrete-model
---
_err: upstreamOverrides.baseURL must use http or https
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayModel
metadata:
  name: incomplete-upstream-endpoint
spec:
  parentRefs:
  - name: ai-gateway
    sectionName: llm
  provider: OpenAI
  upstreamOverrides:
    baseURL: ftp://api.openai.com
---
_err: upstreamOverrides requires provider
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayModel
metadata:
  name: virtual-model-with-upstream-overrides
spec:
  parentRefs:
  - name: ai-gateway
    sectionName: llm
  upstreamOverrides:
    model: should-not-be-accepted
  virtualModel:
    weighted:
      targets:
      - modelRef:
          name: concrete-model
