# yaml-language-server: $schema=https://agentgateway.dev/schema/config
mcp:
  port: 3000
  # Apps call tools by names hardcoded in their HTML, which never carry the
  # gateway's target prefix. `never` exposes names unprefixed and routes calls
  # by looking up which target serves the name; names must be unique across
  # targets (colliding names are dropped from listings and fail on call).
  prefixMode: never
  policies:
    cors:
      allowOrigins:
      - "*"
      allowHeaders:
      - mcp-protocol-version
      - content-type
      - cache-control
      - mcp-session-id
      - mcp-method
      - mcp-name
      exposeHeaders:
      - "Mcp-Session-Id"
  targets:
  - name: map
    stdio:
      cmd: npx
      args: ["-y", "@modelcontextprotocol/server-map", "--stdio"]
  - name: monitor
    stdio:
      cmd: npx
      args: ["-y", "@modelcontextprotocol/server-system-monitor", "--stdio"]
