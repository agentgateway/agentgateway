apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: gw-one
  namespace: default
  labels:
    app: edge
spec:
  gatewayClassName: agentgateway
  listeners:
    - protocol: HTTP
      port: 8080
      name: http
---
