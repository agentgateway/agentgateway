# yaml-language-server: $schema=https://agentgateway.dev/schema/config
config: {}
frontendPolicies:
  accessLog:
    add:
      token_exchange.subject: extauthz.subject
      token_exchange.audience: extauthz.audience
binds:
- port: 3000
  listeners:
  - name: default
    protocol: HTTP
    routes:
    - name: application
      backends:
      - host: localhost:18080
      policies:
        extAuthz:
          host: localhost:7080
          cache:
            key:
            - request.headers["authorization"]
            ttl: extauthz.expires - 5
            maxEntries: 1024
          protocol:
            http:
              path: '"/realms/agentgateway-token-exchange/protocol/openid-connect/token"'
              addRequestHeaders:
                content-type: '"application/x-www-form-urlencoded"'
                authorization: '"Basic " + base64.encode("requester-client:requester-secret")'
                :method: '"POST"'
              body: |
                form.encode({
                  "grant_type": "urn:ietf:params:oauth:grant-type:token-exchange",
                  "subject_token": request.headers["authorization"].split(" ")[1],
                  "subject_token_type": "urn:ietf:params:oauth:token-type:access_token",
                  "requested_token_type": "urn:ietf:params:oauth:token-type:access_token",
                  "audience": "target-client"
                })
              metadata:
                token: json(response.body).access_token
                subject: unvalidatedJwtPayload(json(response.body).access_token).sub
                audience: unvalidatedJwtPayload(json(response.body).access_token).aud
                expires: unvalidatedJwtPayload(json(response.body).access_token).exp
        transformations:
          request:
            set:
              authorization: '"Bearer " + extauthz.token'
