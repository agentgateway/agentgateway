# yaml-language-server: $schema=https://agentgateway.dev/schema/config
frontendPolicies:
  accessLog:
    add:
      user.id: jwt.sub
      user.email: jwt.email

binds:
  - port: 3000
    listeners:
      - name: default
        protocol: HTTPS
        tls:
          cert: examples/mtls/certs/cert.pem
          key: examples/mtls/certs/key.pem
          root: examples/mtls/certs/ca-cert.pem
        routes:
          - name: keycloak-auth
            matches:
              - path:
                  pathPrefix: /auth
            backends:
              - host: localhost:7080
            policies:
              transformations:
                request:
                  set:
                    SSL_CLIENT_CERT: source.certificate
                    X-Forwarded-Proto: '"https"'
                    X-Forwarded-Host: '"localhost:3000"'

          - name: app
            matches:
              - path:
                  pathPrefix: /
            backends:
              - host: localhost:18080
            policies:
              oidc:
                issuer: https://localhost:3000/auth/realms/agentgateway
                clientId: agentgateway-browser
                clientSecret: agentgateway-secret
                redirectURI: https://localhost:3000/oauth/callback
                scopes: ["openid", "profile", "email"]
                authorizationEndpoint: https://localhost:3000/auth/realms/agentgateway/protocol/openid-connect/auth
                tokenEndpoint: http://localhost:7080/auth/realms/agentgateway/protocol/openid-connect/token
                jwks:
                  url: http://localhost:7080/auth/realms/agentgateway/protocol/openid-connect/certs
              transformations:
                request:
                  set:
                    x-client-cert: source.certificate