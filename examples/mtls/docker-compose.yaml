services:
  keycloak:
    container_name: mtls-keycloak
    image: quay.io/keycloak/keycloak:26.3
    command: ["start-dev", "--import-realm", "--http-port", "7080", "--http-relative-path", "/auth"]
    environment:
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: 3000
      KC_SPI_X509CERT_LOOKUP_PROVIDER: nginx
      KC_SPI_X509CERT_LOOKUP_NGINX_SSL_CLIENT_CERT: SSL_CLIENT_CERT
      KC_TRUSTSTORE_PATHS: /opt/keycloak/conf/truststore.pem
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_LOG_LEVEL: info
      KC_PROXY_HEADERS: xforwarded
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
    volumes:
    - ./agentgateway-realm.json:/opt/keycloak/data/import/agentgateway-realm.json:ro
    - ./certs/ca-cert.pem:/opt/keycloak/conf/truststore.pem:ro
    ports:
    - "7080:7080"

  app:
    container_name: mtls-app
    image: hashicorp/http-echo:1.0.0
    command: ["-listen=:5678", "-text=Success! You are authenticated via mTLS certificate and OIDC."]
    ports:
    - "18080:5678"
