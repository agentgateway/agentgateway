apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: agw
  namespace: default
spec:
  targetRefs:
    - kind: AgentgatewayBackend
      name: be
      group: agentgateway.dev
  backend:
    health:
      unhealthyCondition: "response.code >= 500"
      eviction:
         duration: 60s
---
apiVersion: v1
kind: Service
metadata:
  name: webhook
  namespace: default
spec:
  ports:
    - port: 80
---
# Output
output:
