# yaml-language-server: $schema=https://agentgateway.dev/schema/config
#
# Context-compression example.
#
# Run a compression engine alongside the gateway to shrink request messages before they
# reach the LLM. Any service implementing the gateway compression API works; this example
# uses Headroom (https://github.com/headroomlabs-ai/headroom):
#
#   headroom proxy --port 8787 --mode cache
#
# The gateway POSTs each request's messages to the engine's /v1/compress endpoint and
# forwards the compressed result upstream. Send `x-agw-compression-bypass: true` to skip
# compression for a request. If the engine is unreachable, `failureMode: failOpen`
# (the default) forwards the original request unchanged.
#
# This uses the `llm` server form (default port 4000), which matches the Claude Code
# integration guide: https://agentgateway.dev/docs/standalone/main/integrations/llm-clients/claude-code/
llm:
  models:
  - name: "*"
    provider: anthropic
    params:
      apiKey: "$ANTHROPIC_API_KEY"
    contextCompression:
      engine:
        external:
          target:
            host: 127.0.0.1:8787
          # path: /v1/compress    # default
      # failureMode: failOpen     # failOpen (default) | failClosed
      # minSizeBytes: 16384       # skip requests below this serialized size
