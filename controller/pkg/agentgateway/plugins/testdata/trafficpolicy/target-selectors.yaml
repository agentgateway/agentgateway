---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: gw-remote
  namespace: other
  labels:
    app: edge
spec:
  gatewayClassName: agentgateway
  listeners:
    - protocol: HTTP
      port: 8080
      name: http
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: agw
  namespace: default
spec:
  targetSelectors:
    - kind: Gateway
      group: gateway.networking.k8s.io
      sectionName: http
      matchLabels:
        app: edge
  traffic:
    timeouts:
      request: 5s

