_err: bedrock must be set if and only if provider is Bedrock
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayModel
metadata:
  name: bedrock-without-settings
spec:
  parentRefs:
  - name: ai-gateway
    sectionName: llm
  provider: Bedrock
---
_err: model wildcards must be '*', a suffix like 'gpt-*', or a prefix like '*-latest'
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayModel
metadata:
  name: invalid-wildcard
spec:
  parentRefs:
  - name: ai-gateway
    sectionName: llm
  match:
    model: gpt-*-latest
  provider: OpenAI
---
_err: virtual model match.model must be an exact name
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayModel
metadata:
  name: wildcard-virtual-model
spec:
  parentRefs:
  - name: ai-gateway
    sectionName: llm
  match:
    model: virtual/*
  virtualModel:
    weighted:
      targets:
      - modelRef:
          name: concrete-model
---
_err: unknown fields [spec.custom.model]
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayModel
metadata:
  name: custom-model-setting
spec:
  parentRefs:
  - name: ai-gateway
    sectionName: llm
  provider: Custom
  custom:
    model: gpt-oss
    formats:
    - type: Completions
---
_err: 'Unsupported value: "AzureOpenAI"'
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayModel
metadata:
  name: legacy-azure-openai
spec:
  parentRefs:
  - name: ai-gateway
    sectionName: llm
  provider: AzureOpenAI
