apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: extauth-url
  namespace: default
spec:
  targetRefs:
  - kind: Gateway
    name: test
    group: gateway.networking.k8s.io
  traffic:
    extAuth:
      url: https://authz.example.com:9443
      failureMode: FailOpen
      http:
        path: |
          "/authorize"
        allowedRequestHeaders:
        - authorization


---
# Output
output:
- gateway:
    Name: test
    Namespace: default
  resource:
    policy:
      key: traffic/default/extauth-url:extauth:default/test
      name:
        kind: AgentgatewayPolicy
        name: extauth-url
        namespace: default
      target:
        gateway:
          name: test
          namespace: default
      traffic:
        extAuthz:
          failureMode: ALLOW
          http:
            path: |
              "/authorize"
          includeRequestHeaders:
          - authorization
          inlinePolicies:
          - backendTls:
              hostname: authz.example.com
          target:
            inline:
              hostname: authz.example.com
              port: 9443
status:
- apiVersion: agentgateway.dev/v1alpha1
  kind: AgentgatewayPolicy
  metadata:
    name: extauth-url
    namespace: default
  spec: null
  status:
    ancestors:
    - ancestorRef:
        group: gateway.networking.k8s.io
        kind: Gateway
        name: test
        namespace: default
      conditions:
      - lastTransitionTime: fake
        message: Policy accepted
        reason: Valid
        status: "True"
        type: Accepted
      - lastTransitionTime: fake
        message: Attached to all targets
        reason: Attached
        status: "True"
        type: Attached
      controllerName: agentgateway.dev/agentgateway
