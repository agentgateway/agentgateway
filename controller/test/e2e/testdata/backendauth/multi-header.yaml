apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: route-backendauth-multi-header
  namespace: agentgateway-base
spec:
  parentRefs:
    - name: gateway
  hostnames:
    - "multi-header-auth.example.com"
  rules:
    - backendRefs:
        - name: backend
          port: 80
---
apiVersion: v1
kind: Secret
metadata:
  name: multi-header-secret
  namespace: agentgateway-base
type: Opaque
data:
  # base64("primary-api-key")
  DD-API-KEY: cHJpbWFyeS1hcGkta2V5
  # base64("application-key")
  app-key: YXBwbGljYXRpb24ta2V5
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: backendauth-multi-header
  namespace: agentgateway-base
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: route-backendauth-multi-header
  backend:
    auth:
      headers:
        - name: DD-API-KEY
          secretRef:
            name: multi-header-secret
        - name: DD-APPLICATION-KEY
          secretRef:
            name: multi-header-secret
          key: app-key
