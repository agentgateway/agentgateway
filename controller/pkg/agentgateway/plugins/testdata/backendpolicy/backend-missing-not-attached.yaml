apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: agw
  namespace: default
spec:
  targetRefs:
  - kind: AgentgatewayBackend
    name: missing
    group: agentgateway.dev
  backend:
    tls:
      mtlsCertificateRef:
        - name: mtls
---
# Output
output:
- gateway:
    Name: test
    Namespace: default
  resource:
    bind:
      key: 8080/default/test
      port: 8080
- gateway:
    Name: test
    Namespace: default
  resource:
    listener:
      bindKey: 8080/default/test
      key: default/test.http
      name:
        gatewayName: test
        gatewayNamespace: default
        listenerName: http
      protocol: HTTP
- gateway:
    Name: test
    Namespace: default
  resource:
    route:
      backends:
      - backend:
          port: 8080
          service:
            hostname: reviews.default.svc.cluster.local
            namespace: default
        weight: 1
      - {}
      hostnames:
      - www.example.com
      key: default/test.0.http
      listenerKey: default/test.http
      name:
        kind: HTTPRoute
        name: test
        namespace: default
status:
  ancestors:
  - ancestorRef:
      group: agentgateway.dev
      name: StatusSummary
    conditions:
    - lastTransitionTime: fake
      message: Policy accepted
      reason: Valid
      status: "True"
      type: Accepted
    - lastTransitionTime: fake
      message: 'Policy is not attached: AgentgatewayBackend default/missing not found'
      reason: Pending
      status: "False"
      type: Attached
    controllerName: agentgateway.dev/agentgateway
