apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: llm-only
  namespace: default
spec:
  gatewayClassName: agentgateway
  listeners:
  - name: llm
    port: 80
    protocol: HTTP
    allowedRoutes:
      kinds:
      - group: agentgateway.dev
        kind: AgentgatewayModel
      namespaces:
        from: Same
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayModel
metadata:
  name: gpt-5-mini
  namespace: default
spec:
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: llm-only
    sectionName: llm
  provider: OpenAI
  upstreamOverrides:
    model: gpt-5-mini
---
# Output
