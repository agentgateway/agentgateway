apiVersion: v1
kind: Secret
metadata:
  namespace: default
  name: jwt-sign-signing-key
data:
  signingKey: cGVtLXZhbHVl
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  namespace: default
  name: static-backend
spec:
  static:
    host: example.com
    port: 8888
  policies:
    auth:
      jwtSign:
        signingKeyRef:
          name: jwt-sign-signing-key
        alg: RS256
        kid: key-1
        claims:
          iss: acct.user
          sub: acct.user
        ttl: 300s

---
# Output
output:
- gateway:
    Name: basic
    Namespace: default
  resource:
    backend:
      inlinePolicies:
      - auth:
          jwtSign:
            alg: RS256
            claims:
              iss: acct.user
              sub: acct.user
            kid: key-1
            signingKey: pem-value
            ttl: 300s
      key: default/static-backend
      name:
        name: static-backend
        namespace: default
      static:
        host: example.com
        port: 8888
status:
