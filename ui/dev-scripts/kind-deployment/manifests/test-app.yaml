apiVersion: v1
kind: Namespace
metadata:
  name: agentgateway-test
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: httpbin
  namespace: agentgateway-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: httpbin
  template:
    metadata:
      labels:
        app: httpbin
    spec:
      containers:
        - name: httpbin
          image: kennethreitz/httpbin
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: httpbin
  namespace: agentgateway-test
spec:
  selector:
    app: httpbin
  ports:
    - port: 8000
      targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-everything
  namespace: agentgateway-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-everything
  template:
    metadata:
      labels:
        app: mcp-everything
    spec:
      containers:
        - name: mcp-everything
          image: node:20-alpine
          command:
            [
              "npx",
              "-y",
              "@modelcontextprotocol/server-everything",
              "streamableHttp",
            ]
          ports:
            - containerPort: 3001
---
apiVersion: v1
kind: Service
metadata:
  name: mcp-everything
  namespace: agentgateway-test
spec:
  selector:
    app: mcp-everything
  ports:
    - port: 3001
      targetPort: 3001
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: ollama-smallthinker
  namespace: agentgateway-test
spec:
  ai:
    provider:
      openai:
        model: smallthinker
      host: host.docker.internal # ollama/smallthinker needs to run on host machine
      port: 11434
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: mcp-everything
  namespace: agentgateway-test
spec:
  mcp:
    targets:
      - name: everything
        static:
          host: mcp-everything.agentgateway-test.svc.cluster.local
          port: 3001
          protocol: StreamableHTTP
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: test-gateway
  namespace: agentgateway-test
spec:
  gatewayClassName: agentgateway
  listeners:
    - name: http-httpbin
      protocol: HTTP
      port: 8080
      allowedRoutes:
        namespaces:
          from: Same
    - name: http-ai
      protocol: HTTP
      port: 8621
      allowedRoutes:
        namespaces:
          from: Same
    - name: http-mcp
      protocol: HTTP
      port: 8622
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: httpbin-route
  namespace: agentgateway-test
spec:
  parentRefs:
    - name: test-gateway
      sectionName: http-httpbin
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: httpbin
          port: 8000
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ai-route
  namespace: agentgateway-test
spec:
  parentRefs:
    - name: test-gateway
      sectionName: http-ai
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: agentgateway.dev
          kind: AgentgatewayBackend
          name: ollama-smallthinker
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: mcp-route
  namespace: agentgateway-test
spec:
  parentRefs:
    - name: test-gateway
      sectionName: http-mcp
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: agentgateway.dev
          kind: AgentgatewayBackend
          name: mcp-everything
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: ai-cors
  namespace: agentgateway-test
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: ai-route
  traffic:
    cors:
      allowCredentials: false
      allowOrigins: ["*"]
      allowHeaders: ["*"]
      allowMethods: [GET, POST, OPTIONS]
      exposeHeaders: []
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: mcp-cors
  namespace: agentgateway-test
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: mcp-route
  traffic:
    cors:
      allowOrigins: ["*"]
      allowMethods: [GET, POST, OPTIONS]
      allowHeaders: [mcp-protocol-version, content-type, cache-control, mcp-session-id]
      exposeHeaders: [Mcp-Session-Id]
