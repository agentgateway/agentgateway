apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: extmcp-no-backend-ref
  namespace: default
spec:
  targetRefs:
    - kind: Gateway
      name: test
      group: gateway.networking.k8s.io
  backend:
    mcp:
      extMcp:
        processors:
        - remote:
            failureMode: FailClosed
            metadata:
              tenant: 'jwt.sub'
        methods:
          tools/call: Both

