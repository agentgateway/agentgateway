binds:
- port: 3000
  listeners:
  - routes:
    - matches:
      - path:
          pathPrefix: /entra
      backends:
      - host: api.internal.example.com:443
        policies:
          backendTLS: {}
          backendAuth:
            oauth:
              tokenEndpoint:
                backend: entra-token-endpoint
              tokenEndpointPath: /00000000-0000-0000-0000-000000000000/oauth2/v2.0/token
              grantType: jwtBearer
              scopes:
              - https://graph.microsoft.com/User.Read
              - offline_access
              clientAuth:
                clientId: 11111111-1111-1111-1111-111111111111
                clientSecret: replace-with-entra-client-secret
                method: clientSecretPost
              additionalParams:
                requested_token_use: '"on_behalf_of"'

backends:
- name: entra-token-endpoint
  host: login.microsoftonline.com:443
  policies:
    backendTLS: {}
