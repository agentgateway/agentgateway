services:
  keycloak:
    container_name: token-exchange-keycloak
    image: quay.io/keycloak/keycloak:26.3
    command: ["start-dev", "--import-realm", "--http-port", "7080", "--https-port", "7443"]
    environment:
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: 7080
      KC_HOSTNAME_STRICT_BACKCHANNEL: "true"
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"
      KC_LOG_LEVEL: info
    volumes:
    - ./agentgateway-token-exchange-realm.json:/opt/keycloak/data/import/agentgateway-token-exchange-realm.json:ro
    ports:
    - "7080:7080"
    - "7443:7443"

  app:
    container_name: token-exchange-upstream
    image: registry.istio.io/testing/app
    ports:
    - "18080:8080"
