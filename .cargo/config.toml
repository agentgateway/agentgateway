[alias]
xtask = "run --package xtask --"

# Enable tokio_unstable for task dump
# Not supported for non-linux
[target.'cfg(target_os = "linux")']
rustflags = [
    "--cfg", "tokio_unstable",
    "-C", "force-frame-pointers",
]

# x86_64 supports both flags (gnu + musl)
[target.x86_64-unknown-linux-gnu.env]
CFLAGS   = "-fno-omit-frame-pointer -mno-omit-leaf-frame-pointer"
CXXFLAGS = "-fno-omit-frame-pointer -mno-omit-leaf-frame-pointer"

[target.x86_64-unknown-linux-musl.env]
CFLAGS   = "-fno-omit-frame-pointer -mno-omit-leaf-frame-pointer"
CXXFLAGS = "-fno-omit-frame-pointer -mno-omit-leaf-frame-pointer"

# aarch64 supports both flags (gnu + musl)
[target.aarch64-unknown-linux-gnu.env]
CFLAGS   = "-fno-omit-frame-pointer -mno-omit-leaf-frame-pointer"
CXXFLAGS = "-fno-omit-frame-pointer -mno-omit-leaf-frame-pointer"

[target.aarch64-unknown-linux-musl.env]
CFLAGS   = "-fno-omit-frame-pointer -mno-omit-leaf-frame-pointer"
CXXFLAGS = "-fno-omit-frame-pointer -mno-omit-leaf-frame-pointer"

# s390x (and other arches): only the portable flag is supported
[env]
CFLAGS   = "-fno-omit-frame-pointer"
CXXFLAGS = "-fno-omit-frame-pointer"
