apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: agw
  namespace: default
spec:
  targetRefs:
    - kind: HTTPRoute
      name: test
      group: gateway.networking.k8s.io
  backend:
    auth:
      aws:
        secretRef:
          name: aws-auth-secret
        assumeRole:
          roleArn: arn:aws:iam::123456789012:role/backend
          sessionName: agentgateway
          externalId: external
          duration: 1h
          stsRegion: us-east-1
---
apiVersion: v1
kind: Secret
metadata:
  name: aws-auth-secret
  namespace: default
type: Opaque
data:
  accessKey: c2VjcmV0LWFjY2Vzc0tleQ==
  secretKey: c2VjcmV0LXNlY3JldEtleQ==
---
# Output
output:
- gateway:
    Name: test
    Namespace: default
  resource:
    policy:
      backend:
        auth:
          aws:
            assumeRole:
              duration: 3600s
