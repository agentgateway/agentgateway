apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: be
  namespace: default
spec:
  static:
    host: example.com
    port: 80
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: agw
  namespace: default
spec:
  targetRefs:
  - kind: AgentgatewayBackend
    name: be
    group: agentgateway.dev
  backend:
    tls:
      mtlsCertificateRef:
        - name: mtls
---
# Output
output:
- gateway:
    Name: test
    Namespace: default
  resource:
    backend:
      key: default/be
      name:
        name: be
        namespace: default
      static:
        host: example.com
        port: 80
- gateway:
    Name: test
    Namespace: default
  resource:
    bind:
      key: 8080/default/test
      port: 8080
- gateway:
    Name: test
    Namespace: default
  resource:
    listener:
      bindKey: 8080/default/test
      key: default/test.http
      name:
        gatewayName: test
        gatewayNamespace: default
        listenerName: http
      protocol: HTTP
- gateway:
    Name: test
    Namespace: default
  resource:
    route:
      backends:
      - backend:
          port: 8080
          service:
            hostname: reviews.default.svc.cluster.local
            namespace: default
        weight: 1
      - backend:
          backend: default/be
        weight: 1
      hostnames:
      - www.example.com
      key: default/test.0.http
      listenerKey: default/test.http
      name:
        kind: HTTPRoute
        name: test
        namespace: default
- resource:
    policy:
      backend:
        backendTls: {}
      key: default/agw:tls:default/be
      name:
        kind: AgentgatewayPolicy
        name: agw
        namespace: default
      target:
        backend:
          name: be
          namespace: default
status:
  ancestors:
  - ancestorRef:
      group: agentgateway.dev
      kind: AgentgatewayBackend
      name: be
      namespace: default
    conditions:
    - lastTransitionTime: fake
      message: secret default/mtls not found
      reason: PartiallyValid
      status: "True"
      type: Accepted
    controllerName: agentgateway.dev/agentgateway
