apiVersion: v1
kind: Service
metadata:
  name: epp
  namespace: inference-benchmark
  labels:
    app: epp
spec:
  selector:
    app: epp
  ports:
    - name: grpc
      port: 9002
      targetPort: 9002
      protocol: TCP
      appProtocol: grpc
    - name: grpc-health
      port: 9003
      targetPort: 9003
      protocol: TCP
  type: ClusterIP
