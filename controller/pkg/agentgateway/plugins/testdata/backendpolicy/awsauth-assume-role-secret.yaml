              roleArn: arn:aws:iam::123456789012:role/backend
              sessionName: agentgateway
              stsRegion: us-east-1
            explicitConfig:
              accessKeyId: secret-accessKey
              secretAccessKey: secret-secretKey
      key: backend/default/agw:backend-auth:default/test
      name:
        kind: AgentgatewayPolicy
        name: agw
        namespace: default
      target:
        route:
          kind: HTTPRoute
          name: test
