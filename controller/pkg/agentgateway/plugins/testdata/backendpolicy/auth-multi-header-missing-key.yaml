apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: auth-multi-header-missing-key
  namespace: default
spec:
  targetRefs:
    - kind: HTTPRoute
      name: test
      group: gateway.networking.k8s.io
  backend:
    auth:
      headers:
        - name: DD-API-KEY
          secretRef:
            name: datadog-partial
        - name: DD-APPLICATION-KEY
          secretRef:
            name: datadog-partial
          key: app-key
---
apiVersion: v1
kind: Secret
metadata:
  name: datadog-partial
  namespace: default
type: Opaque
data:
  # base64 of "primary-api-key"
  DD-API-KEY: cHJpbWFyeS1hcGkta2V5
  # app-key key intentionally missing
---
