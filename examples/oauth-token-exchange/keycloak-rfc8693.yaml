binds:
- port: 3000
  listeners:
  - routes:
    - matches:
      - path:
          pathPrefix: /keycloak
      backends:
      - host: api.internal.example.com:443
        policies:
          backendTLS: {}
          backendAuth:
            oauth:
              tokenEndpoint:
                backend: keycloak-token-endpoint
              tokenEndpointPath: /realms/example/protocol/openid-connect/token
              audiences:
              - target-client
              - reporting-client
              scopes:
              - optional-scope
              clientAuth:
                clientId: requester-client
                clientSecret: replace-with-keycloak-client-secret

backends:
- name: keycloak-token-endpoint
  host: keycloak.example.com:443
  policies:
    backendTLS: {}
